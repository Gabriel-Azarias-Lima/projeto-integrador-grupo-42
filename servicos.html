<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Serviços — Studio Elegance</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="./src/site-setup.js"></script>
  </head>
  <body class="ui-font min-h-screen bg-ink text-white antialiased">

    <!-- Radial background glow -->
    <div class="pointer-events-none fixed inset-0" aria-hidden="true">
      <div class="absolute inset-0 bg-[radial-gradient(ellipse_1100px_560px_at_50%_-8%,rgba(212,175,55,0.06),transparent_58%)]"></div>
    </div>

    <!-- Injetado por components.js -->
    <div id="modal-root"></div>
    <div id="header-root"></div>
    <div id="booking-root"></div>

    <!-- ============================================================
         MAIN
    ============================================================ -->
    <main class="layout-shell relative z-10 mx-auto w-full px-4 pb-20 sm:px-6 md:px-8 lg:px-10">

      <!-- ── Hero da página ── -->
      <section class="mt-10 sm:mt-14">

        <!-- Breadcrumb -->
        <nav class="flex items-center gap-2 text-[0.68rem] tracking-[0.16em] text-label">
          <a href="./index.html"
            class="flex items-center gap-1.5 transition-colors hover:text-gold/80">
            <i data-lucide="home" class="h-3 w-3"></i>
            Início
          </a>
          <i data-lucide="chevron-right" class="h-3 w-3 opacity-40"></i>
          <span class="text-gold/70">Serviços</span>
        </nav>

        <!-- Título + subtítulo -->
        <div class="mt-5">
          <h1 class="title-font text-[2rem] leading-tight text-white sm:text-[2.6rem] sm:leading-[1.1]">
            <span id="title-prefix">Serviços de </span><span id="title-category" class="text-gold">Cabelo</span>
          </h1>
          <p class="mt-3 max-w-xl text-sm leading-relaxed text-muted sm:text-[0.95rem]">
            Curadoria exclusiva de rituais de beleza que unem técnica ancestral
            e sofisticação contemporânea.
          </p>
        </div>

        <!-- Filtro de categorias -->
        <div class="mt-7 flex items-center gap-2.5 overflow-x-auto pb-1">
          <button class="category-pill active" data-category="cabelo">Cabelo</button>
          <button class="category-pill" data-category="unhas">Unhas</button>
          <button class="category-pill" data-category="estetica">Estética</button>
          <button class="category-pill" data-category="todos">Ver todos</button>
        </div>

        <!-- Contador -->
        <p class="mt-5 text-[0.7rem] tracking-[0.18em] text-label">
          <span id="services-count">—</span> SERVIÇOS DISPONÍVEIS
        </p>
      </section>

      <!-- ── Grid de cards ── -->
      <section class="mt-6 sm:mt-8">
        <div id="services-grid" class="grid gap-5 sm:grid-cols-2 lg:grid-cols-3">

          <!-- Skeletons de carregamento -->
          <div class="service-card skeleton-card" id="skel-1">
            <div class="service-card-photo bg-white/5 animate-pulse"></div>
            <div class="flex flex-col gap-3 p-5">
              <div class="h-4 w-3/4 rounded-lg bg-white/5 animate-pulse"></div>
              <div class="h-3 w-full rounded-lg bg-white/5 animate-pulse"></div>
              <div class="h-3 w-2/3 rounded-lg bg-white/5 animate-pulse"></div>
            </div>
          </div>
          <div class="service-card skeleton-card" id="skel-2">
            <div class="service-card-photo bg-white/5 animate-pulse"></div>
            <div class="flex flex-col gap-3 p-5">
              <div class="h-4 w-3/4 rounded-lg bg-white/5 animate-pulse"></div>
              <div class="h-3 w-full rounded-lg bg-white/5 animate-pulse"></div>
              <div class="h-3 w-2/3 rounded-lg bg-white/5 animate-pulse"></div>
            </div>
          </div>
          <div class="service-card skeleton-card" id="skel-3">
            <div class="service-card-photo bg-white/5 animate-pulse"></div>
            <div class="flex flex-col gap-3 p-5">
              <div class="h-4 w-3/4 rounded-lg bg-white/5 animate-pulse"></div>
              <div class="h-3 w-full rounded-lg bg-white/5 animate-pulse"></div>
              <div class="h-3 w-2/3 rounded-lg bg-white/5 animate-pulse"></div>
            </div>
          </div>

        </div>

        <!-- Estado vazio / erro -->
        <div id="services-empty" class="hidden mt-16 flex flex-col items-center gap-4 text-center">
          <div class="grid h-16 w-16 place-items-center rounded-full border border-white/8 bg-white/4">
            <i data-lucide="scissors" class="h-7 w-7 text-label"></i>
          </div>
          <p id="services-empty-msg" class="text-sm text-muted">Nenhum serviço encontrado.</p>
        </div>
      </section>

    </main>

    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="./src/api.js"></script>
    <script src="./src/components.js"></script>
    <script>
      initPage();

      /* ── Estado global dos serviços ── */
      let todosServicos = [];
      let categoriaAtiva = 'cabelo';

      const grid       = document.getElementById('services-grid');
      const countEl    = document.getElementById('services-count');
      const prefixEl   = document.getElementById('title-prefix');
      const categoryEl = document.getElementById('title-category');
      const emptyEl    = document.getElementById('services-empty');

      const TITLES = {
        cabelo:   ['Serviços de ', 'Cabelo'],
        unhas:    ['Serviços de ', 'Unhas'],
        estetica: ['Serviços de ', 'Estética'],
        todos:    ['Todos os ',    'Serviços'],
      };

      /* ── Formata duração em minutos → string legível ── */
      function formatarDuracao(min) {
        if (min < 60) return `${min} min`;
        const h = Math.floor(min / 60);
        const m = min % 60;
        return m === 0 ? `${h} h` : `${h} h ${m} min`;
      }

      /* ── Formata preço Decimal → "R$ X,XX" ── */
      function formatarPreco(preco) {
        return Number(preco).toLocaleString('pt-BR', { style: 'currency', currency: 'BRL' });
      }

      /* ── Cria HTML de um card de serviço ── */
      function criarCardServico(s) {
        const article = document.createElement('article');
        article.className    = 'service-card';
        article.dataset.category = s.categoria;

        const imgSrc = s.imagem_url ||
          'https://images.unsplash.com/photo-1560066984-138dadb4c035?w=600&q=80';

        const preco    = formatarPreco(s.preco);
        const duracao  = formatarDuracao(s.duracao_minutos);

        article.innerHTML = `
          <div class="service-card-photo">
            <img src="${imgSrc}" alt="${s.nome}" loading="lazy" decoding="async" />
          </div>
          <div class="flex flex-col gap-3 p-5">
            <div class="flex items-start justify-between gap-2">
              <h3 class="title-font text-[1.05rem] leading-snug text-white">${s.nome}</h3>
              <span class="shrink-0 text-sm font-semibold text-gold">${preco}</span>
            </div>
            <p class="flex-1 text-[0.8rem] leading-relaxed text-muted line-clamp-3">
              ${s.descricao || ''}
            </p>
            <div class="flex items-center gap-1.5 text-label">
              <i data-lucide="clock" class="h-3.5 w-3.5 shrink-0"></i>
              <span class="text-[0.72rem]">${duracao}</span>
            </div>
            <button class="service-btn mt-1">AGENDAR AGORA</button>
          </div>
        `;

        article.querySelector('.service-btn').addEventListener('click', () => {
          window.openBooking({
            id:       s.id,
            name:     s.nome,
            price:    preco,
            duration: duracao,
          });
        });

        return article;
      }

      /* ── Renderiza o grid com base na categoria ativa ── */
      function renderServicos(cat) {
        categoriaAtiva = cat;
        const filtrados = cat === 'todos'
          ? todosServicos
          : todosServicos.filter(s => s.categoria === cat);

        grid.style.transition = 'opacity 0.18s ease';
        grid.style.opacity    = '0';

        setTimeout(() => {
          // Remove cards antigos (mantém skeletons ocultos se ainda houver)
          grid.querySelectorAll('.service-card:not(.skeleton-card)').forEach(el => el.remove());

          filtrados.forEach(s => grid.appendChild(criarCardServico(s)));

          countEl.textContent = filtrados.length;

          const [prefix, label] = TITLES[cat] || TITLES.cabelo;
          prefixEl.textContent   = prefix;
          categoryEl.textContent = label;

          emptyEl.classList.toggle('hidden', filtrados.length > 0);
          grid.style.opacity = '1';

          if (typeof lucide !== 'undefined') lucide.createIcons({ nodes: [grid] });
        }, 180);

        document.querySelectorAll('.category-pill').forEach(p =>
          p.classList.toggle('active', p.dataset.category === cat)
        );
      }

      /* ── Remove os skeletons de carregamento ── */
      function removerSkeletons() {
        grid.querySelectorAll('.skeleton-card').forEach(el => el.remove());
      }

      /* ── Carrega serviços da API ── */
      async function carregarServicos() {
        try {
          const lista = await window.studioApi.servicos.listar();
          todosServicos = lista;
          removerSkeletons();
          renderServicos('cabelo');
        } catch (err) {
          removerSkeletons();
          emptyEl.classList.remove('hidden');
          document.getElementById('services-empty-msg').textContent =
            'Não foi possível carregar os serviços. Verifique se o servidor está rodando.';
          countEl.textContent = '0';
          console.error('[Studio Elegance] Erro ao carregar serviços:', err.message);
        }
      }

      /* ── Filtro por categorias ── */
      document.querySelectorAll('.category-pill').forEach(btn => {
        btn.addEventListener('click', () => {
          if (todosServicos.length > 0) renderServicos(btn.dataset.category);
        });
      });

      carregarServicos();
    </script>
  </body>
</html>
